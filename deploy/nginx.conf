upstream itda_backend {
    server app:8000;
}

server {
    listen 80;
    server_name api.itda.kr;

    # Let's Encrypt 인증용
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP → HTTPS 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.itda.kr;

    ssl_certificate /etc/letsencrypt/live/api.itda.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.itda.kr/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 클라이언트 최대 바디 사이즈 (음성 업로드용)
    client_max_body_size 50M;

    # API 프록시
    location / {
        proxy_pass http://itda_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 타임아웃 (TTS 합성 대기)
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # WebSocket 프록시
    location /ws/ {
        proxy_pass http://itda_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
