<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#E76F51">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <meta property="og:title" content="잇다 - 소리로 이어주는 따뜻한 다리">
    <meta property="og:description" content="텍스트를 입력하면 자연스러운 음성으로 변환해드립니다.">
    <meta property="og:image" content="https://itda-language.onrender.com/static/og-image.png">
    <meta property="og:url" content="https://itda-language.onrender.com/app">
    <meta property="og:type" content="website">
    <title>잇다</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Nanum+Gothic&family=Nanum+Myeongjo&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background: #FFF9F6;
            min-height: 100vh;
            color: #2E2520;
            overflow-x: hidden;
        }
        /* 공통 */
        .hidden { display: none !important; }
        .page { min-height: 100vh; display: flex; flex-direction: column; }

        /* ─── 로그인/회원가입 ─── */
        .auth-page {
            justify-content: flex-start;
            align-items: center;
            padding: 32px;
            padding-top: 60px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .auth-page .logo { width: 80px; height: 80px; margin-bottom: 8px; }
        .auth-page .app-name { font-size: 28px; font-weight: 900; }
        .auth-page .subtitle { font-size: 14px; color: #78716C; margin-bottom: 32px; }
        .form-group { width: 100%; max-width: 360px; margin-bottom: 12px; }
        .form-row { display: flex; gap: 8px; align-items: center; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #DEC0B9;
            border-radius: 12px;
            font-size: 16px;
            background: #FFF;
            color: #2E2520;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus { border-color: #E76F51; }
        .form-group label { display: block; font-size: 13px; color: #78716C; margin-bottom: 4px; }
        .btn-primary {
            width: 100%; max-width: 360px;
            padding: 16px;
            background: #E76F51;
            color: #FFF;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #A33D23; }
        .btn-primary:disabled { background: #DEC0B9; cursor: not-allowed; }
        .switch-mode {
            margin-top: 16px;
            font-size: 14px;
            color: #78716C;
            background: none;
            border: none;
            cursor: pointer;
        }
        .error-msg { color: #BA1A1A; font-size: 14px; margin-bottom: 8px; text-align: center; max-width: 360px; }
        .at-sign { font-size: 18px; font-weight: bold; color: #78716C; padding: 0 4px; }

        /* ─── 홈 ─── */
        .home-page {
            padding: 0;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #FFF;
            border-bottom: 1px solid #EAD6D1;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .top-bar .logo-small { width: 36px; height: 36px; }
        .top-bar .title { font-size: 18px; font-weight: 800; }
        .top-bar .user-btn {
            background: none; border: none;
            font-size: 14px; color: #78716C; cursor: pointer;
        }
        .top-icon-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: #F5EBE8;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .top-icon-btn:active { background: #EAD6D1; }

        /* 탭 */
        .tabs {
            display: flex;
            background: #FFF;
            border-bottom: 1px solid #EAD6D1;
            flex-shrink: 0;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #78716C;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active { color: #E76F51; border-bottom-color: #E76F51; }

        /* TTS 탭 */
        .tab-content { flex: 1; padding: 20px; overflow-y: auto; min-height: 0; }
        .tts-area {
            width: 100%;
            min-height: 160px;
            padding: 16px;
            border: 1.5px solid #DEC0B9;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            background: #FFF;
            color: #2E2520;
            resize: none;
            outline: none;
        }
        .tts-area:focus { border-color: #E76F51; }
        .char-count { text-align: right; font-size: 12px; color: #8A716C; margin-top: 4px; }
        .tts-controls {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            align-items: center;
        }
        .btn-speak {
            flex: 1;
            padding: 16px;
            background: #E76F51;
            color: #FFF;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .btn-speak:disabled { background: #DEC0B9; }
        .btn-icon {
            width: 52px; height: 52px;
            border-radius: 12px;
            border: 1.5px solid #DEC0B9;
            background: #FFF;
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 즐겨찾기 탭 */
        .phrase-list { list-style: none; }
        .phrase-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #FFF;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid #EAD6D1;
            cursor: pointer;
            transition: background 0.15s;
        }
        .phrase-item:active { background: #FFF1ED; }
        .phrase-text { flex: 1; font-size: 15px; }
        .phrase-count { font-size: 12px; color: #8A716C; }
        .phrase-play { font-size: 20px; background: none; border: none; cursor: pointer; }
        .phrase-categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 12px;
        }
        .cat-btn {
            white-space: nowrap;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1.5px solid #DEC0B9;
            background: #FFF;
            font-size: 13px;
            cursor: pointer;
            color: #57423D;
            transition: all 0.2s;
        }
        .cat-btn.active { background: #E76F51; color: #FFF; border-color: #E76F51; }

        /* 음성 선택 */
        .voice-select { margin-bottom: 16px; }
        .voice-select select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #DEC0B9;
            border-radius: 12px;
            font-size: 14px;
            background: #FFF;
            outline: none;
        }
        .voice-select select:focus { border-color: #E76F51; }
        .voice-label { font-size: 13px; color: #78716C; margin-bottom: 6px; }

        /* 설정 모달 */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 100;
        }
        .modal {
            background: #FFF;
            width: 100%;
            max-width: 480px;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            max-height: 70vh;
            overflow-y: auto;
        }
        .modal h3 { font-size: 18px; margin-bottom: 16px; }
        .modal .close-btn {
            float: right;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #78716C;
        }
        .slider-group { margin-bottom: 16px; }
        .slider-group label { font-size: 14px; display: flex; justify-content: space-between; }
        .slider-group input[type=range] {
            width: 100%;
            accent-color: #E76F51;
            margin-top: 4px;
        }

        /* 로딩 */
        .spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2.5px solid #FFF;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 오디오 시각화 */
        .audio-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding: 12px 16px;
            background: #FFF1ED;
            border-radius: 12px;
        }
        .audio-bar audio { flex: 1; width: 100%; height: 36px; }

        /* ─── 농인 접근성: 재생 상태 피드백 ─── */

        /* 재생 상태 배너 */
        .play-status {
            margin-top: 12px;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.3s;
        }
        .play-status.playing {
            background: #E76F51;
            color: #FFF;
            animation: pulse 1s ease-in-out infinite;
        }
        .play-status.done {
            background: #006A63;
            color: #FFF;
        }
        .play-status.error {
            background: #BA1A1A;
            color: #FFF;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 이퀄라이저 바 */
        .eq-bars {
            display: inline-flex;
            gap: 4px;
            height: 24px;
            align-items: flex-end;
            vertical-align: middle;
            margin-right: 8px;
        }
        .eq-bars span {
            display: inline-block;
            width: 5px;
            background: #FFF;
            border-radius: 2px;
            animation: eqBounce 0.8s ease-in-out infinite;
        }
        .eq-bars span:nth-child(1) { animation-delay: 0s; height: 10px; }
        .eq-bars span:nth-child(2) { animation-delay: 0.15s; height: 18px; }
        .eq-bars span:nth-child(3) { animation-delay: 0.3s; height: 12px; }
        .eq-bars span:nth-child(4) { animation-delay: 0.45s; height: 20px; }
        .eq-bars span:nth-child(5) { animation-delay: 0.1s; height: 14px; }
        .eq-bars span:nth-child(6) { animation-delay: 0.25s; height: 16px; }
        .eq-bars span:nth-child(7) { animation-delay: 0.4s; height: 10px; }
        @keyframes eqBounce {
            0%, 100% { transform: scaleY(0.3); }
            50% { transform: scaleY(1); }
        }

        /* 화면 전체 테두리 깜빡임 (재생 중) */
        .screen-border-flash {
            position: fixed;
            inset: 0;
            border: 5px solid #E76F51;
            border-radius: 0;
            pointer-events: none;
            z-index: 9999;
            animation: borderPulse 1.5s ease-in-out infinite;
        }
        @keyframes borderPulse {
            0%, 100% { border-color: #E76F51; opacity: 1; }
            50% { border-color: #FFB4A2; opacity: 0.4; }
        }

        /* 재생 프로그레스 바 */
        .play-progress {
            width: 100%;
            height: 6px;
            background: #EAD6D1;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        .play-progress-bar {
            height: 100%;
            background: #E76F51;
            border-radius: 3px;
            transition: width 0.3s linear;
        }

        /* 볼륨 상태 + 조절 바 */
        .volume-control {
            margin-top: 12px;
            padding: 12px 14px;
            background: #FFF;
            border: 1.5px solid #DEC0B9;
            border-radius: 12px;
        }
        .volume-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .vol-btn {
            width: 36px; height: 36px;
            border: 1.5px solid #DEC0B9;
            border-radius: 8px;
            background: #FFF;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .vol-btn:active { background: #FFF1ED; }
        .vol-bar-wrap {
            flex: 1;
            height: 14px;
            background: #EAD6D1;
            border-radius: 7px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .vol-bar {
            height: 100%;
            background: linear-gradient(90deg, #006A63, #E76F51);
            border-radius: 7px;
            transition: width 0.15s;
        }
        .vol-percent {
            font-size: 14px;
            font-weight: 700;
            color: #2E2520;
            min-width: 40px;
            text-align: right;
        }
        .vol-status-text {
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            margin-top: 6px;
        }
        .vol-status-text.ok { color: #006A63; }
        .vol-status-text.low { color: #E65100; }
        .vol-status-text.muted { color: #BA1A1A; }

        /* 스피커 상태 표시 */
        .speaker-status {
            margin-top: 12px;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            display: none;
        }
        .speaker-status.ok {
            display: block;
            background: #E6F9F7;
            color: #006A63;
            border: 1.5px solid #006A63;
        }
        .speaker-status.warning {
            display: block;
            background: #FFF3E0;
            color: #E65100;
            border: 1.5px solid #E65100;
        }
        .speaker-status.danger {
            display: block;
            background: #FFEBEE;
            color: #BA1A1A;
            border: 1.5px solid #BA1A1A;
            animation: warningShake 0.5s ease-in-out;
        }

        /* 스피커 테스트 버튼 */
        .test-speaker-btn {
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            background: #FFF;
            border: 1.5px solid #DEC0B9;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #57423D;
            cursor: pointer;
            transition: all 0.2s;
        }
        .test-speaker-btn:active {
            background: #FFF1ED;
            border-color: #E76F51;
        }

        /* 볼륨 경고 배너 */
        .volume-warning {
            margin-top: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            background: #BA1A1A;
            color: #FFF;
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            animation: warningShake 0.5s ease-in-out;
        }
        .volume-warning .boost-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 20px;
            background: #FFF;
            color: #BA1A1A;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        @keyframes warningShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* 실시간 오디오 레벨 미터 */
        .audio-level {
            margin-top: 10px;
            padding: 12px 16px;
            background: #FFF;
            border: 1.5px solid #DEC0B9;
            border-radius: 12px;
        }
        .audio-level-label {
            font-size: 13px;
            color: #78716C;
            margin-bottom: 6px;
        }
        .audio-level-bar-wrap {
            height: 12px;
            background: #EAD6D1;
            border-radius: 6px;
            overflow: hidden;
        }
        .audio-level-bar {
            height: 100%;
            width: 0%;
            border-radius: 6px;
            background: linear-gradient(90deg, #006A63, #E76F51, #BA1A1A);
            transition: width 0.1s;
        }
        .audio-level-text {
            font-size: 13px;
            font-weight: 700;
            margin-top: 4px;
            text-align: center;
        }
        .audio-level-text.ok { color: #006A63; }
        .audio-level-text.muted { color: #BA1A1A; }

        /* ─── 대화방 목록 ─── */
        .rooms-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: #FFF;
            border-bottom: 1px solid #EAD6D1;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            flex-shrink: 0;
        }
        .rooms-bar::-webkit-scrollbar { display: none; }
        .room-chip {
            white-space: nowrap;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1.5px solid #DEC0B9;
            background: #FFF;
            font-size: 13px;
            font-weight: 500;
            color: #57423D;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }
        .room-chip.active {
            background: #E76F51;
            color: #FFF;
            border-color: #E76F51;
        }
        .room-chip .room-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #006A63;
            margin-right: 4px;
            vertical-align: middle;
        }
        .room-chip.active .room-dot { background: #FFF; }
        .room-add-btn {
            white-space: nowrap;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1.5px dashed #DEC0B9;
            background: none;
            font-size: 13px;
            color: #8A716C;
            cursor: pointer;
        }
        .room-add-btn:active { background: #FFF1ED; }

        /* ─── 상단 음성 칩 ─── */
        .voice-chip {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
            border-radius: 16px;
            background: #FFF1ED;
            border: 1px solid #EAD6D1;
            font-size: 12px;
            color: #57423D;
            cursor: pointer;
            white-space: nowrap;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .voice-chip:active { background: #EAD6D1; }
        .voice-chip-arrow { font-size: 10px; color: #8A716C; }

        /* ─── 채팅형 UI ─── */
        .chat-history {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #FFF9F6;
        }
        .chat-empty {
            text-align: center;
            color: #78716C;
            font-size: 15px;
            margin: auto;
            padding: 40px 20px;
            line-height: 1.8;
        }
        .chat-bubble {
            align-self: flex-end;
            max-width: 85%;
            background: #FFF;
            color: #2E2520;
            border-radius: 16px 16px 4px 16px;
            padding: 12px 16px;
            word-break: break-word;
            position: relative;
            animation: bubbleIn 0.2s ease-out;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            border: 1px solid #EAD6D1;
        }
        @keyframes bubbleIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-bubble.active {
            border-color: #E76F51;
            box-shadow: 0 2px 12px rgba(231,111,81,0.15);
        }
        .chat-bubble-text {
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #2E2520;
        }
        .chat-bubble-bottom {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 8px;
        }
        .chat-replay-btn {
            background: #E76F51;
            border: none;
            border-radius: 50%;
            width: 32px; height: 32px;
            font-size: 13px;
            cursor: pointer;
            color: #FFF;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .chat-replay-btn:active { background: #A33D23; }
        .chat-bubble-time {
            font-size: 11px;
            color: #8A716C;
        }
        /* 말풍선 내 카라오케 */
        .chat-bubble .karaoke-spoken { color: #2E2520; font-weight: 700; }
        .chat-bubble .karaoke-unspoken { color: rgba(46,37,32,0.25); }
        .chat-bubble .karaoke-cursor { background: #E76F51; }
        .chat-bubble-progress {
            margin-top: 8px;
            height: 4px;
            background: #EAD6D1;
            border-radius: 2px;
            overflow: hidden;
        }
        .chat-bubble-progress-bar {
            height: 100%;
            background: #E76F51;
            border-radius: 2px;
            transition: width 0.2s linear;
        }
        /* 하단 입력바 */
        .chat-input-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: #FFF;
            border-top: 1px solid #EAD6D1;
            flex-shrink: 0;
        }

<script>
const API = '';
let token = localStorage.getItem('itda_token') || '';
let refreshToken = localStorage.getItem('itda_refresh') || '';
let isLoginMode = true;
let personas = [];
let phrases = [];
let currentCategory = 'all';

// ─── 네이티브 브릿지 감지 ───
const hasNativeBridge = typeof window.NativeBridge !== 'undefined';

// ─── 대화방 관리 ───
let chatRooms = JSON.parse(localStorage.getItem('itda_rooms') || 'null');
let currentRoomId = null;
let activeBubbleId = null;

// 최초 또는 마이그레이션
function initRooms() {
    if (!chatRooms) {
        // 기존 단일 메시지 → 첫 대화방으로 마이그레이션
        const oldMsgs = JSON.parse(localStorage.getItem('itda_chat') || '[]');
        chatRooms = [{
            id: Date.now(),
            name: '대화 1',
            messages: oldMsgs,
            createdAt: new Date().toISOString()
        }];
        localStorage.removeItem('itda_chat');
        saveRooms();
    }
    if (chatRooms.length === 0) {
        createRoom('대화 1');
    }
    currentRoomId = chatRooms[chatRooms.length - 1].id;
}

function saveRooms() {
    // 각 대화방 최대 100개 메시지
    chatRooms.forEach(r => { if (r.messages.length > 100) r.messages = r.messages.slice(-100); });
    localStorage.setItem('itda_rooms', JSON.stringify(chatRooms));
}

function getCurrentRoom() {
    return chatRooms.find(r => r.id === currentRoomId) || chatRooms[0];
}

// chatMessages 호환성 (기존 코드에서 참조)
function getChatMessages() {
    const room = getCurrentRoom();
    return room ? room.messages : [];
}

function saveChatMessages() {
    saveRooms();
}

function createRoom(name) {
    const room = { id: Date.now(), name: name, messages: [], createdAt: new Date().toISOString() };
    chatRooms.unshift(room);
    currentRoomId = room.id;
    saveRooms();
    renderRoomsBar();
    renderAllChatBubbles();
    return room;
}

function switchRoom(roomId) {
    currentRoomId = roomId;
    renderRoomsBar();
    renderAllChatBubbles();
}

function deleteRoom(roomId) {
    if (chatRooms.length <= 1) return; // 최소 1개 유지
    if (!confirm('이 대화방을 삭제하시겠습니까?')) return;
    chatRooms = chatRooms.filter(r => r.id !== roomId);
    if (currentRoomId === roomId) currentRoomId = chatRooms[chatRooms.length - 1].id;
    saveRooms();
    renderRoomsBar();
    renderAllChatBubbles();
}

function promptNewRoom() {
    const name = prompt('대화방 이름을 입력하세요:', '대화 ' + (chatRooms.length + 1));
    if (name && name.trim()) {
        createRoom(name.trim());
    }
}

function renderRoomsBar() {
    const bar = document.getElementById('roomsBar');
    if (!bar) return;
    bar.innerHTML = '';

    chatRooms.forEach(room => {
        const chip = document.createElement('button');
        chip.className = 'room-chip' + (room.id === currentRoomId ? ' active' : '');
        chip.innerHTML = '<span class="room-dot"></span>' + escapeHtml(room.name);
        chip.onclick = () => switchRoom(room.id);
        // 길게 누르면 삭제
        let holdTimer = null;
        chip.addEventListener('touchstart', () => { holdTimer = setTimeout(() => deleteRoom(room.id), 700); });
        chip.addEventListener('touchend', () => { clearTimeout(holdTimer); });
        chip.addEventListener('touchmove', () => { clearTimeout(holdTimer); });
        bar.appendChild(chip);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'room-add-btn';
    addBtn.textContent = '+ 새 대화';
    addBtn.onclick = promptNewRoom;
    bar.appendChild(addBtn);
}

// ─── 음성 선택 빠른 모달 ───
function openVoiceModal() {
    document.getElementById('voiceModal').classList.remove('hidden');
}

// ─── 글꼴/글씨 크기 ───
function applyFont() {
    const font = document.getElementById('fontSelect').value;
    document.documentElement.style.setProperty('--chat-font', font);
    document.querySelectorAll('.chat-bubble-text, .chat-input, .karaoke-spoken, .karaoke-unspoken').forEach(el => {
        el.style.fontFamily = font;
    });
    localStorage.setItem('itda_font', font);
}

function applyFontSize(val) {
    const size = parseInt(val);
    document.getElementById('fontSizeVal').textContent = size;
    document.documentElement.style.setProperty('--chat-font-size', size + 'px');
    document.querySelectorAll('.chat-bubble-text, .chat-input, .karaoke-spoken, .karaoke-unspoken').forEach(el => {
        el.style.fontSize = size + 'px';
    });
    localStorage.setItem('itda_font_size', size);
}

function loadFontSettings() {
    const font = localStorage.getItem('itda_font');
    const size = localStorage.getItem('itda_font_size');
    if (font) {
        document.getElementById('fontSelect').value = font;
        applyFont();
    }
    if (size) {
        document.getElementById('fontSize').value = size;
        applyFontSize(size);
    }
}

function updateVoiceChip() {
    const sel = document.getElementById('voiceSelect');
    const chip = document.getElementById('voiceChipName');
    if (sel && chip) {
        const opt = sel.options[sel.selectedIndex];
        if (opt) {
            // 이름에서 짧게 추출 (첫 단어)
            const name = opt.textContent.split(' ')[0].split('-')[0];
            chip.textContent = name || '선택';
        }
    }
}

function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

function scrollChatToBottom() {
    const h = document.getElementById('chatHistory');
    if (h) requestAnimationFrame(() => { h.scrollTop = h.scrollHeight; });
}

function renderAllChatBubbles() {
    const h = document.getElementById('chatHistory');
    if (!h) return;
    h.querySelectorAll('.chat-bubble').forEach(b => b.remove());
    const empty = document.getElementById('chatEmpty');
    const msgs = getChatMessages();
    if (msgs.length === 0) { if (empty) empty.classList.remove('hidden'); return; }
    if (empty) empty.classList.add('hidden');
    msgs.forEach(msg => renderChatBubble(msg));
    scrollChatToBottom();
}

function renderChatBubble(msg, isActive) {
    const h = document.getElementById('chatHistory');
    const empty = document.getElementById('chatEmpty');
    if (empty) empty.classList.add('hidden');

    const b = document.createElement('div');
    b.className = 'chat-bubble' + (isActive ? ' active' : '');
    b.id = 'bubble-' + msg.id;

    const time = new Date(msg.timestamp);
    const timeStr = time.getHours().toString().padStart(2,'0') + ':' + time.getMinutes().toString().padStart(2,'0');

    b.innerHTML =
        '<div class="chat-bubble-text">' + escapeHtml(msg.text) + '</div>' +
        '<div class="chat-bubble-karaoke hidden" style="margin-top:6px;line-height:1.6;font-size:16px;">' +
            '<span class="karaoke-spoken"></span><span class="karaoke-cursor"></span><span class="karaoke-unspoken"></span>' +
        '</div>' +
        '<div class="chat-bubble-progress hidden"><div class="chat-bubble-progress-bar" style="width:0%"></div></div>' +
        '<div class="chat-bubble-bottom">' +
            '<span class="chat-bubble-time">' + timeStr + '</span>' +
            '<button class="chat-replay-btn" onclick="replayMessage(' + msg.id + ')">▶</button>' +
        '</div>';

    h.appendChild(b);
    return b;
}

function sendMessage() {
    const input = document.getElementById('ttsText');
    const text = input.value.trim();
    if (!text) return;

    const msg = { id: Date.now(), text: text, timestamp: new Date().toISOString() };
    const room = getCurrentRoom();
    if (room) room.messages.push(msg);
    saveRooms();

    const bubble = renderChatBubble(msg, true);
    input.value = '';
    scrollChatToBottom();

    synthesizeForMessage(msg);
}

async function synthesizeForMessage(msg) {
    const btn = document.getElementById('speakBtn');
    btn.disabled = true;
    activeBubbleId = msg.id;
    const bubble = document.getElementById('bubble-' + msg.id);

    try {
        const body = {
            text: msg.text,
            speaker: document.getElementById('voiceSelect').value || 'ko-KR-SunHiNeural',
            speed: parseInt(document.getElementById('speed').value),
            pitch: parseInt(document.getElementById('pitch').value),
            volume: parseInt(document.getElementById('volume').value),
            format: 'mp3'
        };
        const res = await api('/api/v1/tts/synthesize', { method: 'POST', body: JSON.stringify(body) });

        if (res.ok) {
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const player = document.getElementById('audioPlayer');
            player.src = url;
            msg.audioUrl = url;

            let vibTimer = null, progTimer = null, borderEl = null;

            function startFeedback() {
                borderEl = document.createElement('div');
                borderEl.className = 'screen-border-flash';
                document.body.appendChild(borderEl);
                if (hasNativeBridge) NativeBridge.vibrate(150);
                else if (navigator.vibrate) navigator.vibrate(150);
                vibTimer = setInterval(() => {
                    if (hasNativeBridge) NativeBridge.vibrate(30);
                    else if (navigator.vibrate) navigator.vibrate([30, 200, 30]);
                }, 2000);
            }

            function stopFeedback() {
                if (borderEl) { borderEl.remove(); borderEl = null; }
                if (vibTimer) { clearInterval(vibTimer); vibTimer = null; }
                if (progTimer) { clearInterval(progTimer); progTimer = null; }
                if (navigator.vibrate) navigator.vibrate(0);
            }

            player.onplay = () => {
                if (bubble) {
                    bubble.classList.add('active');
                    const textEl = bubble.querySelector('.chat-bubble-text');
                    const karaokeEl = bubble.querySelector('.chat-bubble-karaoke');
                    const progEl = bubble.querySelector('.chat-bubble-progress');
                    if (textEl) textEl.classList.add('hidden');
                    if (karaokeEl) karaokeEl.classList.remove('hidden');
                    if (progEl) progEl.classList.remove('hidden');

                    // 카라오케
                    const spoken = bubble.querySelector('.karaoke-spoken');
                    const unspoken = bubble.querySelector('.karaoke-unspoken');
                    const progBar = bubble.querySelector('.chat-bubble-progress-bar');

                    function updateKaraoke() {
                        if (!player || player.paused || player.ended) return;
                        const p = player.duration > 0 ? player.currentTime / player.duration : 0;
                        const off = Math.floor(p * msg.text.length);
                        if (spoken) spoken.textContent = msg.text.substring(0, off);
                        if (unspoken) unspoken.textContent = msg.text.substring(off);
                        if (progBar) progBar.style.width = (p * 100) + '%';
                        karaokeRafId = requestAnimationFrame(updateKaraoke);
                    }
                    karaokeRafId = requestAnimationFrame(updateKaraoke);
                }
                startFeedback();
                startAudioLevelMonitor(player);
                startSentenceVibration(msg.text);
            };

            player.onended = () => {
                stopFeedback();
                stopAudioLevelMonitor();
                if (karaokeRafId) { cancelAnimationFrame(karaokeRafId); karaokeRafId = null; }
                stopSentenceVibration();
                if (bubble) {
                    bubble.classList.remove('active');
                    const textEl = bubble.querySelector('.chat-bubble-text');
                    const karaokeEl = bubble.querySelector('.chat-bubble-karaoke');
                    const progEl = bubble.querySelector('.chat-bubble-progress');
                    if (textEl) textEl.classList.remove('hidden');
                    if (karaokeEl) karaokeEl.classList.add('hidden');
                    if (progEl) progEl.classList.add('hidden');
                }
                activeBubbleId = null;
                if (hasNativeBridge) NativeBridge.vibrate(50);
                else if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
                setTimeout(() => { document.getElementById('ttsText').focus(); }, 300);
            };

            player.onpause = () => {
                if (!player.ended) {
                    stopFeedback();
                    stopAudioLevelMonitor();
                    if (karaokeRafId) { cancelAnimationFrame(karaokeRafId); karaokeRafId = null; }
                    stopSentenceVibration();
                }
            };

            checkVolumeBeforePlay();
            player.play();
        } else {
            if (bubble) {
                bubble.style.background = '#BA1A1A';
                bubble.querySelector('.chat-bubble-bottom').innerHTML = '<span style="font-size:12px;">실패 — 탭하여 재시도</span>';
                bubble.onclick = () => { bubble.style.background = ''; bubble.onclick = null; synthesizeForMessage(msg); };
            }
        }
    } catch (e) {
        if (bubble) bubble.style.background = '#BA1A1A';
    }
    btn.disabled = false;
}

function replayMessage(msgId) {
    const msg = getChatMessages().find(m => m.id === msgId);
    if (!msg) return;
    const bubble = document.getElementById('bubble-' + msgId);
    if (bubble) bubble.classList.add('active');
    synthesizeForMessage(msg);
}

// ─── API 호출 ───
async function api(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json', ...opts.headers };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const res = await fetch(API + path, { ...opts, headers });
    if (res.status === 401 && refreshToken) {
        const r = await fetch(API + '/api/v1/auth/refresh', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refresh_token: refreshToken })
        });
        if (r.ok) {
            const d = await r.json();
            token = d.access_token;
            refreshToken = d.refresh_token;
            localStorage.setItem('itda_token', token);
            localStorage.setItem('itda_refresh', refreshToken);
            headers['Authorization'] = 'Bearer ' + token;
            return fetch(API + path, { ...opts, headers });
        } else {
            logout();
            return res;
        }
    }
    return res;
}

async function handleAuth() {
    const btn = document.getElementById('authBtn');
    const emailId = document.getElementById('emailId').value.trim();
    const domain = document.getElementById('emailDomain').value;
    const email = emailId + '@' + domain;
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('authError');
    errEl.classList.add('hidden');

    if (!emailId || !password) {
        errEl.textContent = '이메일과 비밀번호를 입력해주세요.';
        errEl.classList.remove('hidden');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    try {
        let res;
        if (isLoginMode) {
            res = await fetch(API + '/api/v1/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
        } else {
            const nickname = document.getElementById('nickname').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const gender = document.getElementById('gender').value;
            const birthId = document.getElementById('birthId').value.trim();
            if (!nickname) {
                errEl.textContent = '이름을 입력해주세요.';
                errEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = '회원가입';
                return;
            }
            res = await fetch(API + '/api/v1/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, nickname, phone, gender, birth_id: birthId })
            });
        }

        if (res.ok) {
            const data = await res.json();
            token = data.access_token;
            refreshToken = data.refresh_token;
            localStorage.setItem('itda_token', token);
            localStorage.setItem('itda_refresh', refreshToken);
            showHome();
        } else {
            const err = await res.json().catch(() => ({}));
            errEl.textContent = err.detail || '오류가 발생했습니다.';
            errEl.classList.remove('hidden');
        }
    } catch (e) {
        errEl.textContent = '서버에 연결할 수 없습니다.';
        errEl.classList.remove('hidden');
    }
    btn.disabled = false;
    btn.textContent = isLoginMode ? '로그인' : '회원가입';
}

async function synthesize() {
    const text = document.getElementById('ttsText').value.trim();
    if (!text) return;

    const btn = document.getElementById('speakBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 변환 중...';

    try {
        const body = {
            text,
            speaker: document.getElementById('voiceSelect').value || 'ko-KR-SunHiNeural',
            speed: parseInt(document.getElementById('speed').value),
            pitch: parseInt(document.getElementById('pitch').value),
            volume: parseInt(document.getElementById('volume').value),
            format: 'mp3'
        };
        const res = await api('/api/v1/tts/synthesize', {
            method: 'POST',
            body: JSON.stringify(body)
        });

        if (res.ok) {
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const player = document.getElementById('audioPlayer');
            const status = document.getElementById('playStatus');
            player.src = url;
            document.getElementById('audioBar').classList.remove('hidden');

            // ─── 농인 접근성 피드백 ───
            let vibrationTimer = null;
            let progressTimer = null;
            let borderFlash = null;

            function startAccessibilityFeedback() {
                // 1. 화면 테두리 깜빡임
                if (!borderFlash) {
                    borderFlash = document.createElement('div');
                    borderFlash.className = 'screen-border-flash';
                    document.body.appendChild(borderFlash);
                }

                // 2. 지속 진동 (2초마다 짧은 펄스)
                if (navigator.vibrate) {
                    navigator.vibrate(150);
                    vibrationTimer = setInterval(() => {
                        if (navigator.vibrate) navigator.vibrate([30, 200, 30]);
                    }, 2000);
                }

                // 3. 프로그레스 바 업데이트
                progressTimer = setInterval(() => {
                    if (player.duration > 0) {
                        const pct = (player.currentTime / player.duration) * 100;
                        const bar = document.getElementById('progressBar');
                        if (bar) bar.style.width = pct + '%';
                    }
                }, 200);
            }

            function stopAccessibilityFeedback() {
                if (borderFlash) { borderFlash.remove(); borderFlash = null; }
                if (vibrationTimer) { clearInterval(vibrationTimer); vibrationTimer = null; }
                if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
                if (navigator.vibrate) navigator.vibrate(0);
            }

            player.onplay = () => {
                status.className = 'play-status playing';
                status.innerHTML = '음성 재생 중...<div class="play-progress"><div id="progressBar" class="play-progress-bar" style="width:0%"></div></div>';
                status.classList.remove('hidden');
                startAccessibilityFeedback();
                startAudioLevelMonitor(player);
                startEqualizer();
                startKaraoke(text);
                startSentenceVibration(text);
            };
            player.onended = () => {
                stopAccessibilityFeedback();
                stopAudioLevelMonitor();
                stopEqualizer();
                stopKaraoke();
                stopSentenceVibration();
                status.className = 'play-status done';
                status.textContent = '✓ 재생 완료';
                if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
                setTimeout(() => status.classList.add('hidden'), 3000);

                // 재생 완료 → 입력창 비우고 포커스 (새 문장 바로 입력)
                setTimeout(() => {
                    const ta = document.getElementById('ttsText');
                    ta.value = '';
                    document.getElementById('charCount').textContent = '0';
                    ta.focus();
                    ta.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 500);
            };
            player.onpause = () => {
                if (!player.ended) {
                    stopAccessibilityFeedback();
                    stopAudioLevelMonitor();
                    stopEqualizer();
                    stopKaraoke();
                    stopSentenceVibration();
                    status.className = 'play-status done';
                    status.textContent = '⏸ 일시정지';
                }
            };

            // 볼륨 확인 후 재생
            checkVolumeBeforePlay();
            player.play();
        } else {
            const err = await res.json().catch(() => ({}));
            const status = document.getElementById('playStatus');
            status.className = 'play-status error';
            status.textContent = '✕ ' + (err.detail || 'TTS 변환에 실패했습니다.');
            status.classList.remove('hidden');
        }
    } catch (e) {
        alert('서버에 연결할 수 없습니다.');
    }
    btn.disabled = false;
    btn.innerHTML = '🔊 음성 변환';
}

// ─── 볼륨 바 제어 ───
let currentVolume = 100;

function changeVolume(delta) {
    currentVolume = Math.max(0, Math.min(100, currentVolume + delta));
    applyVolume();
    if (navigator.vibrate) navigator.vibrate(20);
}

function setVolumeFromBar(e) {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = e.clientX || e.touches[0].clientX;
    currentVolume = Math.round(Math.max(0, Math.min(100, ((x - rect.left) / rect.width) * 100)));
    applyVolume();
}

function applyVolume() {
    // 네이티브 브릿지가 있으면 실제 기기 볼륨 읽기
    if (hasNativeBridge) {
        currentVolume = NativeBridge.getVolume();
    }

    const player = document.getElementById('audioPlayer');
    if (player) player.volume = currentVolume / 100;

    document.getElementById('volBar').style.width = currentVolume + '%';
    document.getElementById('volPercent').textContent = currentVolume + '%';

    // 설정 모달 슬라이더 동기화
    const slider = document.getElementById('deviceVolume');
    if (slider) { slider.value = currentVolume; document.getElementById('deviceVolVal').textContent = currentVolume + '%'; }

    // 상태 텍스트
    const statusEl = document.getElementById('volStatusText');
    if (currentVolume === 0) {
        statusEl.textContent = '🔇 음소거 — 상대방이 들을 수 없습니다!';
        statusEl.className = 'vol-status-text muted';
    } else if (currentVolume < 20) {
        statusEl.textContent = '🔉 볼륨 낮음 — 상대방이 못 들을 수 있습니다';

    } else {
        statusEl.textContent = '🔊 볼륨 정상';
        statusEl.className = 'vol-status-text ok';
    }
}

// ─── 스피커 테스트 (테스트 음 재생 + 마이크로 확인) ───
async function testSpeaker() {
    const statusEl = document.getElementById('speakerStatus');
    const btn = document.getElementById('testSpeakerBtn');
    btn.disabled = true;
    btn.textContent = '🔔 테스트 중...';
    statusEl.className = 'speaker-status';
    statusEl.style.display = 'none';

    try {
        // 1. 테스트 음 생성 (440Hz 비프, 0.5초)
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = 440;
        osc.type = 'sine';
        gain.gain.value = 0.5;
        osc.connect(gain);
        gain.connect(ctx.destination);

        // 2. 마이크 접근 시도
        let micDetected = false;
        let micStream = null;
        try {
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const micCtx = new (window.AudioContext || window.webkitAudioContext)();
            const micSource = micCtx.createMediaStreamSource(micStream);
            const micAnalyser = micCtx.createAnalyser();
            micAnalyser.fftSize = 256;
            micSource.connect(micAnalyser);
            const micData = new Uint8Array(micAnalyser.frequencyBinCount);

            // 테스트 음 재생
            osc.start();
            if (navigator.vibrate) navigator.vibrate(100);

            // 0.5초 후 마이크에서 소리가 잡히는지 확인
            await new Promise(r => setTimeout(r, 500));

            micAnalyser.getByteFrequencyData(micData);
            const micAvg = micData.reduce((a, b) => a + b, 0) / micData.length;
            micDetected = micAvg > 3;

            osc.stop();
            micStream.getTracks().forEach(t => t.stop());
            micCtx.close();
        } catch (micErr) {
            // 마이크 권한 거부 — 테스트 음만 재생
            osc.start();
            if (navigator.vibrate) navigator.vibrate(100);
            await new Promise(r => setTimeout(r, 500));
            osc.stop();
        }

        ctx.close();

        // 3. 결과 표시
        if (micStream && micDetected) {
            statusEl.className = 'speaker-status ok';
            statusEl.textContent = '✅ 스피커 정상 — 소리가 나오고 있습니다';
            if (navigator.vibrate) navigator.vibrate(50);
        } else if (micStream && !micDetected) {
            statusEl.className = 'speaker-status danger';
            statusEl.innerHTML = '🔇 스피커에서 소리가 감지되지 않습니다<br><small>기기 볼륨을 올려주세요 (측면 버튼)</small>';
            if (navigator.vibrate) navigator.vibrate([80, 100, 80, 100, 80]);
        } else {
            statusEl.className = 'speaker-status warning';
            statusEl.innerHTML = '🔔 테스트 음이 재생되었습니다<br><small>옆 사람에게 소리가 들렸는지 확인해주세요</small>';
            if (navigator.vibrate) navigator.vibrate([50, 80, 50]);
        }
    } catch (e) {
        statusEl.className = 'speaker-status warning';
        statusEl.textContent = '⚠️ 테스트 실패 — 브라우저가 지원하지 않습니다';
    }

    btn.disabled = false;
    btn.textContent = '🔔 스피커 테스트';
}

function setDeviceVolume(val) {

// ─── 볼륨 경고 (재생 전 확인) ───
function checkVolumeBeforePlay() {
    const player = document.getElementById('audioPlayer');
    const warning = document.getElementById('volumeWarning');

    // 네이티브 브릿지로 실제 기기 볼륨 확인
    if (hasNativeBridge) {
        currentVolume = NativeBridge.getVolume();
        applyVolume();
    }

    if (player.volume === 0 || player.muted || (hasNativeBridge && NativeBridge.isMuted())) {
        warning.innerHTML = '🔇 음소거 상태입니다 — 상대방이 들을 수 없습니다!<br><button class="boost-btn" onclick="boostVolume()">🔊 볼륨 올리기</button>';
        warning.classList.remove('hidden');
        if (navigator.vibrate) navigator.vibrate([80, 100, 80, 100, 80]);
        return false;
    }
    if (player.volume < 0.15) {
        warning.innerHTML = '🔉 볼륨이 너무 낮습니다 — 상대방이 잘 듣지 못할 수 있습니다<br><button class="boost-btn" onclick="boostVolume()">🔊 볼륨 올리기</button>';
        warning.classList.remove('hidden');
        if (navigator.vibrate) navigator.vibrate([80, 100, 80]);
    }
    return true;
}

function boostVolume() {
    if (hasNativeBridge) {
        NativeBridge.boostVolume();
        NativeBridge.vibrate(50);
        currentVolume = NativeBridge.getVolume();
    } else {
        currentVolume = 100;
    }
    const player = document.getElementById('audioPlayer');
    player.volume = 1.0;
    player.muted = false;
    document.getElementById('volumeWarning').classList.add('hidden');
    applyVolume();
}

// ─── 실시간 오디오 레벨 모니터 (Web Audio API) ───
let audioCtx = null;
let analyser = null;
let audioSource = null;
let levelTimer = null;

function startAudioLevelMonitor(player) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!audioSource) {
            audioSource = audioCtx.createMediaElementSource(player);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            audioSource.connect(analyser);
            analyser.connect(audioCtx.destination);
        }

        const levelEl = document.getElementById('audioLevel');
        const barEl = document.getElementById('audioLevelBar');
        const textEl = document.getElementById('audioLevelText');
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        levelEl.classList.remove('hidden');

        levelTimer = setInterval(() => {
            analyser.getByteFrequencyData(dataArray);
            const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
            const pct = Math.min(100, (avg / 128) * 100);
            barEl.style.width = pct + '%';

            if (pct > 5) {
                textEl.textContent = '✓ 소리가 나가고 있습니다';
                textEl.className = 'audio-level-text ok';
            } else {
                textEl.textContent = '✕ 소리가 나가지 않습니다';
                textEl.className = 'audio-level-text muted';
            }
        }, 100);
    } catch (e) {
        // Web Audio API 미지원 시 무시
    }
}

function stopAudioLevelMonitor() {
    if (levelTimer) { clearInterval(levelTimer); levelTimer = null; }
    const barEl = document.getElementById('audioLevelBar');
    const textEl = document.getElementById('audioLevelText');
    const levelEl = document.getElementById('audioLevel');
    if (barEl) barEl.style.width = '0%';
    if (levelEl) setTimeout(() => levelEl.classList.add('hidden'), 2000);
}

// Phase 1: 이퀄라이저 + 카라오케 + 문장 진동

// ─── 이퀄라이저 렌더러 (Canvas + 스프링 물리) ───
class EqualizerRenderer {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.barCount = 8;
        this.barWidth = 8;
        this.gap = 5;
        this.maxH = 48;
        this.minH = 4;
        this.levels = new Float32Array(this.barCount);
        this.targets = new Float32Array(this.barCount);
        this.velocities = new Float32Array(this.barCount);
        this.rafId = null;
        this.active = false;
    }

    start(analyserNode) {
        this.analyser = analyserNode;
        this.dataArray = new Uint8Array(analyserNode.frequencyBinCount);
        this.active = true;
        this._resize();
        this._loop();
    }

    stop() {
        this.active = false;
        if (this.rafId) cancelAnimationFrame(this.rafId);
        this.targets.fill(0);
        // animate out
        this._loop();
        setTimeout(() => { if (this.rafId) cancelAnimationFrame(this.rafId); }, 500);
    }

    _resize() {
        const dpr = window.devicePixelRatio || 1;
        const w = this.canvas.clientWidth;
        const h = this.canvas.clientHeight;
        this.canvas.width = w * dpr;
        this.canvas.height = h * dpr;
        this.ctx.scale(dpr, dpr);
        this.w = w;
        this.h = h;
    }

    _loop() {
        if (this.analyser && this.active) {
            this.analyser.getByteFrequencyData(this.dataArray);
            const binSize = Math.floor(this.dataArray.length / this.barCount);
            for (let i = 0; i < this.barCount; i++) {
                let sum = 0;
                for (let j = 0; j < binSize; j++) sum += this.dataArray[i * binSize + j];
                this.targets[i] = Math.min(1, (sum / binSize) / 180);
            }
        }

        // 스프링 물리
        const stiffness = 1500, dt = 1 / 60;
        const damping = 0.5 * 2 * Math.sqrt(stiffness);
        for (let i = 0; i < this.barCount; i++) {
            const force = stiffness * (this.targets[i] - this.levels[i]);
            this.velocities[i] += (force - damping * this.velocities[i]) * dt;
            this.levels[i] = Math.max(0, Math.min(1, this.levels[i] + this.velocities[i] * dt));
        }

        this._draw();
        this.rafId = requestAnimationFrame(() => this._loop());
    }

    _draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.w, this.h);
        const totalW = this.barCount * this.barWidth + (this.barCount - 1) * this.gap;
        const startX = (this.w - totalW) / 2;

        for (let i = 0; i < this.barCount; i++) {
            const lv = this.levels[i];
            const h = this.minH + (this.maxH - this.minH) * lv;
            const x = startX + i * (this.barWidth + this.gap);
            const y = this.h - h - 4;
            const alpha = this.active ? 0.6 + 0.4 * lv : 0.3;

            ctx.fillStyle = `rgba(231, 111, 81, ${alpha})`;
            ctx.beginPath();
            ctx.roundRect(x, y, this.barWidth, h, 3);
            ctx.fill();

            // 글로우
            if (this.active && lv > 0.1) {
                ctx.fillStyle = `rgba(231, 111, 81, ${0.15 * lv})`;
                ctx.beginPath();
                ctx.roundRect(x - 2, this.h - 6, this.barWidth + 4, 4, 2);
                ctx.fill();
            }
        }
    }
}

let eqRenderer = null;

function startEqualizer() {
    const wrap = document.getElementById('eqCanvasWrap');

}

function stopEqualizer() {

        document.getElementById('eqCanvasWrap').classList.add('hidden');

}

// ─── 카라오케 하이라이트 ───
let karaokeRafId = null;
let karaokeText = '';
let lastScrollTime = 0;

function startKaraoke(text) {
    karaokeText = text;
    document.getElementById('ttsText').classList.add('hidden');
    const kv = document.getElementById('karaokeView');
    kv.classList.remove('hidden');

    const spokenEl = document.getElementById('karaokeSpoken');
    const cursorEl = document.getElementById('karaokeCursor');
    const unspokenEl = document.getElementById('karaokeUnspoken');
    const player = document.getElementById('audioPlayer');

    function update() {
        if (!player || player.paused || player.ended) return;
        const progress = player.duration > 0 ? player.currentTime / player.duration : 0;
        const offset = Math.floor(progress * text.length);

        spokenEl.textContent = text.substring(0, offset);
        unspokenEl.textContent = text.substring(offset);

        // 자동 스크롤 (500ms 쓰로틀)
        const now = Date.now();
        if (now - lastScrollTime > 500) {
            cursorEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            lastScrollTime = now;
        }

        karaokeRafId = requestAnimationFrame(update);
    }
    karaokeRafId = requestAnimationFrame(update);
}

function stopKaraoke() {
    if (karaokeRafId) cancelAnimationFrame(karaokeRafId);
    karaokeRafId = null;
    document.getElementById('karaokeView').classList.add('hidden');
    document.getElementById('ttsText').classList.remove('hidden');
}

// ─── 문장 펄스 진동 ───
let sentenceBoundaries = [];
let lastSentenceIdx = -1;
let sentenceTimer = null;

function computeSentenceBoundaries(text) {
    const ends = [];
    for (let i = 0; i < text.length; i++) {
        if ('.!?\u3002\n'.includes(text[i])) {
            ends.push((i + 1) / text.length);
        }
    }
    if (ends.length === 0 || ends[ends.length - 1] < 0.99) ends.push(1.0);
    return ends;
}

function startSentenceVibration(text) {
    sentenceBoundaries = computeSentenceBoundaries(text);
    lastSentenceIdx = -1;
    const player = document.getElementById('audioPlayer');
    sentenceTimer = setInterval(() => {
        if (!player || player.paused || player.ended || player.duration === 0) return;
        const progress = player.currentTime / player.duration;
        let idx = sentenceBoundaries.findIndex(b => b > progress);
        if (idx === -1) idx = sentenceBoundaries.length - 1;
        if (idx > 0 && idx !== lastSentenceIdx) {
            lastSentenceIdx = idx;
            if (hasNativeBridge) NativeBridge.vibrate(30);
            else if (navigator.vibrate) navigator.vibrate(30);
        }
    }, 100);
}

function stopSentenceVibration() {
    if (sentenceTimer) { clearInterval(sentenceTimer); sentenceTimer = null; }
    lastSentenceIdx = -1;
}

        ta.addEventListener('input', e => {

            document.getElementById('charCount').textContent = val.length;
            if (e.inputType === 'insertText' && val.length > 0) {

                    ta.value = val + '\n';
                    document.getElementById('charCount').textContent = ta.value.length;
                    ta.selectionStart = ta.selectionEnd = ta.value.length;
                }
            }
        });
    }
});

async function addNewPhrase() {
    const input = document.getElementById('newPhraseInput');

    if (!text) return;
    const cat = currentCategory === 'all' ? 'custom' : currentCategory;

// ─── 음성 필터 ───
let voiceCategories = null;
let activeFilters = { gender: null, age_group: null, region: null, tone: null };

function toggleVoiceFilters() {
    const el = document.getElementById('voiceFilters');
    const btn = document.getElementById('filterToggleBtn');
    el.classList.toggle('hidden');
    btn.textContent = el.classList.contains('hidden') ? '필터 ▼' : '필터 ▲';
}

async function loadVoiceCategories() {
    try {
        const res = await fetch(API + '/api/v1/voices/categories');
        if (res.ok) {
            voiceCategories = await res.json();
            renderVoiceFilters();
        }
    } catch (e) {}
}

function renderVoiceFilters() {
    if (!voiceCategories) return;
    const container = document.getElementById('voiceFilters');
    const labels = { gender: '성별', age_group: '연령대', region: '지역', tone: '톤' };
    container.innerHTML = '';

    Object.entries(labels).forEach(([key, label]) => {
        const cats = voiceCategories[key + 's'] || voiceCategories[key] || {};
        if (Object.keys(cats).length === 0) return;

        const section = document.createElement('div');
        section.className = 'filter-section';
        section.innerHTML = '<div class="filter-label">' + label + '</div>';
        const chips = document.createElement('div');
        chips.className = 'filter-chips';

        // 전체 칩
        const allChip = document.createElement('button');
        allChip.className = 'filter-chip' + (!activeFilters[key] ? ' active' : '');
        allChip.textContent = '전체';
        allChip.onclick = () => { activeFilters[key] = null; renderVoiceFilters(); loadFilteredVoices(); };
        chips.appendChild(allChip);

        Object.entries(cats).forEach(([code, name]) => {
            const chip = document.createElement('button');
            chip.className = 'filter-chip' + (activeFilters[key] === code ? ' active' : '');
            chip.textContent = name;
            chip.onclick = () => {
                activeFilters[key] = activeFilters[key] === code ? null : code;
                renderVoiceFilters();
                loadFilteredVoices();
            };
            chips.appendChild(chip);
        });

        section.appendChild(chips);
        container.appendChild(section);
    });
}

async function loadFilteredVoices() {
    const params = new URLSearchParams();
    Object.entries(activeFilters).forEach(([k, v]) => { if (v) params.set(k, v); });
    try {
        const res = await fetch(API + '/api/v1/voices/personas?' + params.toString());
        if (res.ok) {
            personas = await res.json();
            rebuildVoiceSelect();
        }
    } catch (e) {}
}

function rebuildVoiceSelect() {
    const sel = document.getElementById('voiceSelect');
    sel.innerHTML = '';
    const langGroups = {
        'ko-KR': '🇰🇷 한국어', 'en-US': '🇺🇸 영어', 'ja-JP': '🇯🇵 일본어',
        'zh-CN': '🇨🇳 중국어', 'vi-VN': '🇻🇳 베트남어', 'es-ES': '🇪🇸 스페인어',
        'mn-MN': '🇲🇳 몽골어', 'hi-IN': '🇮🇳 힌디어', 'fr-FR': '🇫🇷 프랑스어',
    };
    const grouped = {};
    personas.forEach(p => {
        const code = p.clova_speaker;
        const prefix = code.includes('Multilingual') ? 'ko-KR' : code.split('-').slice(0, 2).join('-');
        if (!grouped[prefix]) grouped[prefix] = [];
        grouped[prefix].push(p);
    });
    Object.entries(langGroups).forEach(([prefix, label]) => {
        const voices = grouped[prefix];
        if (!voices) return;
        const grp = document.createElement('optgroup');
        grp.label = label;
        voices.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.clova_speaker;
            opt.textContent = p.display_name;
            grp.appendChild(opt);
        });
        sel.appendChild(grp);
    });
}
