services:
  # FastAPI 백엔드
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery 워커 (커스텀 음성 학습)
  celery-worker:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
    command: celery -A app.tasks.voice_training:celery_app worker --loglevel=info

  # PostgreSQL
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: itda
      POSTGRES_PASSWORD: itda
      POSTGRES_DB: itda_language
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Redis (캐시 + Celery 브로커)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
